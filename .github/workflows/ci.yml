name: CI

on:
  push:
    branches: ["feature/**", "main"]
  pull_request:
    branches: ["main"]

jobs:
  backend-tests:
    name: Backend — Python tests
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run unit tests (no slow/ML tests)
        run: python -m pytest tests/test_api.py tests/test_analysis.py -v --tb=short -m "not slow" -q
        env:
          REDIS_URL: redis://localhost:6379/0
          OUTPUTS_DIR: /tmp/test-outputs

  frontend-typecheck:
    name: Frontend — TypeScript type-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Type-check
        run: npx tsc --noEmit
        working-directory: frontend

  lint:
    name: Backend — Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check backend/ --ignore E501,E402,F401 --exit-zero
